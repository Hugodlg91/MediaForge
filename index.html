<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src-tauri/icons/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaForge</title>
    <!-- Apply theme before first render to avoid flash -->
    <script>
      (function () {
        var t = localStorage.getItem("mf-theme");
        document.documentElement.setAttribute("data-theme", (!t || t === "dark") ? "dark" : "light");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
